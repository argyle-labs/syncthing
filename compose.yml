# Syncthing — continuous file synchronization.
# docs: docs/syncthing.md
#
# Web UI on :8384; sync traffic on :22000 (tcp/udp); discovery on :21027/udp.
# Mount whatever folders you sync under /data (add more volumes as needed).
services:
  syncthing:
    image: lscr.io/linuxserver/syncthing:latest
    container_name: syncthing
    hostname: syncthing
    restart: unless-stopped
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - UMASK=${UMASK:-022}
      - TZ=${TZ:-America/Denver}
    volumes:
      - ${SYNCTHING_CONFIG:-./config}:/config
      - ${SYNCTHING_DATA:-./data}:/data
    ports:
      - "8384:8384"
      - "22000:22000/tcp"
      - "22000:22000/udp"
      - "21027:21027/udp"
